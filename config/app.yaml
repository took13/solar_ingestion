app_name: solar_ingestion

database:
  connection_string: "DRIVER={ODBC Driver 17 for SQL Server};SERVER=10.48.184.177\\SQLEXPRESS;DATABASE=SolarDataDB;UID=sa;PWD=admin;TrustServerCertificate=yes;"

storage:
  raw_root: "C:/SOLAR_V2/DATA/raw"

